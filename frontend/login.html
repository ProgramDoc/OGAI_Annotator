<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGAI · Sign In</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --navy: #161b2e; --blue: #274472; --sky: #5e9ad0;
  --green: #16a34a; --red: #dc2626; --amber: #d97706;
  --bg: #f4f5f9; --card: #ffffff; --border: #dce4ee;
  --text: #1e293b; --muted: #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'IBM Plex Sans', sans-serif;
  background: var(--navy); color: var(--text); font-size: 14px;
}

body {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; min-height: 100vh;
  background: radial-gradient(ellipse at 60% 20%, #1e2d4a 0%, #161b2e 60%);
}

/* ── Brand header ── */
.brand {
  font-size: 22px; font-weight: 700; color: #fff;
  letter-spacing: -.3px; margin-bottom: 28px; text-align: center;
}
.brand span { color: var(--sky); }
.brand sub {
  display: block; font-size: 11px; font-weight: 400;
  color: rgba(255,255,255,.35); letter-spacing: .08em;
  text-transform: uppercase; margin-top: 4px; font-family: 'IBM Plex Mono', monospace;
}

/* ── Card ── */
.card {
  background: var(--card); border-radius: 12px;
  width: 380px; box-shadow: 0 24px 60px rgba(0,0,0,.45);
  overflow: hidden;
}

/* ── Tabs ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1; padding: 14px; text-align: center;
  font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--muted); background: #f8fafc;
  border-bottom: 2px solid transparent; transition: all .15s;
  user-select: none;
}
.tab.active {
  color: var(--blue); background: var(--card);
  border-bottom-color: var(--sky);
}
.tab:hover:not(.active) { color: var(--text); background: #f1f5f9; }

/* ── Form body ── */
.form-body { padding: 28px; }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--blue); letter-spacing: .05em; text-transform: uppercase;
  margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 6px; font-family: inherit; font-size: 13px;
  color: var(--text); background: #f8fafc; outline: none;
  transition: border-color .15s, background .15s;
}
.field input:focus { border-color: var(--sky); background: #fff; }
.field input.error { border-color: var(--red); }

.field-hint {
  font-size: 10.5px; color: var(--muted); margin-top: 4px;
}

/* ── Error / success banners ── */
.banner {
  padding: 10px 12px; border-radius: 6px; font-size: 12px;
  margin-bottom: 16px; display: none; line-height: 1.4;
}
.banner.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
.banner.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }

/* ── Submit button ── */
.submit-btn {
  width: 100%; padding: 10px; border: none; border-radius: 6px;
  background: var(--sky); color: #fff; font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background .15s; margin-top: 4px;
}
.submit-btn:hover:not(:disabled) { background: #4a8ac0; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── Divider ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0; color: var(--muted); font-size: 11px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── Admin shortcut ── */
.admin-btn {
  width: 100%; padding: 9px; border: 1.5px solid var(--border);
  border-radius: 6px; background: transparent; font-family: inherit;
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all .15s; display: flex;
  align-items: center; justify-content: center; gap: 6px;
}
.admin-btn:hover { border-color: var(--navy); color: var(--navy); background: #f8fafc; }

/* Admin secret panel */
.admin-panel {
  display: none; margin-top: 12px;
  background: #fefce8; border: 1.5px solid #fbbf24;
  border-radius: 6px; padding: 14px;
}
.admin-panel.open { display: block; }
.admin-panel .field { margin-bottom: 12px; }
.admin-panel .field:last-child { margin-bottom: 0; }
.admin-panel label { color: #92400e !important; }
.admin-panel input { background: #fffbeb !important; }
.admin-submit {
  width: 100%; padding: 8px; border: none; border-radius: 5px;
  background: #d97706; color: #fff; font-family: inherit;
  font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 10px;
}
.admin-submit:hover { background: #b45309; }

/* ── Footer ── */
.card-footer {
  padding: 14px 28px; background: #f8fafc;
  border-top: 1px solid var(--border); font-size: 11px;
  color: var(--muted); text-align: center;
}

/* Loading spinner */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite; vertical-align: middle;
  margin-right: 4px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="brand">
  <span>OGAI</span> Annotation Platform
  <sub>Evidence Synthesis Infrastructure</sub>
</div>

<div class="card">

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-login"    onclick="switchTab('login')">Sign In</div>
    <div class="tab"        id="tab-register" onclick="switchTab('register')">Register</div>
  </div>

  <!-- ── LOGIN PANEL ── -->
  <div id="panel-login" class="form-body">
    <div class="banner" id="login-banner"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@institution.edu" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') submitLogin()">
    </div>

    <button class="submit-btn" id="login-btn" onclick="submitLogin()">Sign In</button>

    <div class="divider">or</div>

    <button class="admin-btn" onclick="toggleAdminPanel()">
      Admin access
    </button>

    <div class="admin-panel" id="admin-panel">
      <div class="field">
        <label>Admin secret key</label>
        <input type="password" id="admin-secret" placeholder="Secret key"
               onkeydown="if(event.key==='Enter') submitAdmin()">
      </div>
      <div class="banner" id="admin-banner"></div>
      <button class="admin-submit" onclick="submitAdmin()">Enter as Admin</button>
    </div>
  </div>

  <!-- ── REGISTER PANEL ── -->
  <div id="panel-register" class="form-body" style="display:none">
    <div class="banner" id="register-banner"></div>

    <div class="field">
      <label>Display Name</label>
      <input type="text" id="reg-name" placeholder="e.g. Tom" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@institution.edu" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 8 characters" autocomplete="new-password">
      <div class="field-hint">At least 8 characters.</div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') submitRegister()">
    </div>

    <button class="submit-btn" id="register-btn" onclick="submitRegister()">Create Account</button>
  </div>

  <div class="card-footer">
    OGAI · AiTheia · Secure annotation platform
  </div>
</div>

<script>
// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('panel-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('panel-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  clearBanners();
}

function clearBanners() {
  ['login-banner','register-banner','admin-banner'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'banner';
    el.textContent = '';
  });
}

function showBanner(id, msg, type='error') {
  const el = document.getElementById(id);
  el.className = 'banner ' + type;
  el.textContent = msg;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Please wait…';
  } else {
    btn.disabled = false;
    btn.textContent = btnId === 'login-btn' ? 'Sign In' : 'Create Account';
  }
}

// ── Admin panel toggle ────────────────────────────────────────────────────
function toggleAdminPanel() {
  const panel = document.getElementById('admin-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('admin-secret').focus();
  }
}

// ── Login ────────────────────────────────────────────────────────────────
async function submitLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  clearBanners();

  if (!email || !password) {
    showBanner('login-banner', 'Please enter your email and password.');
    return;
  }

  setLoading('login-btn', true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const body = await res.json();
    if (!res.ok) {
      showBanner('login-banner', body.detail || 'Login failed.');
    } else {
      window.location.href = '/';
    }
  } catch (e) {
    showBanner('login-banner', 'Network error — is the server running?');
  } finally {
    setLoading('login-btn', false);
  }
}

// ── Admin secret ─────────────────────────────────────────────────────────
async function submitAdmin() {
  const secret = document.getElementById('admin-secret').value;
  clearBanners();
  if (!secret) { showBanner('admin-banner', 'Enter the admin secret key.'); return; }

  try {
    const res = await fetch('/api/auth/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret }),
    });
    const body = await res.json();
    if (!res.ok) {
      showBanner('admin-banner', body.detail || 'Invalid secret.');
    } else {
      window.location.href = '/';
    }
  } catch (e) {
    showBanner('admin-banner', 'Network error.');
  }
}

// ── Register ─────────────────────────────────────────────────────────────
async function submitRegister() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;
  clearBanners();

  if (!name || !email || !password || !confirm) {
    showBanner('register-banner', 'Please fill in all fields.');
    return;
  }
  if (password.length < 8) {
    showBanner('register-banner', 'Password must be at least 8 characters.');
    return;
  }
  if (password !== confirm) {
    showBanner('register-banner', 'Passwords do not match.');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showBanner('register-banner', 'Please enter a valid email address.');
    return;
  }

  setLoading('register-btn', true);
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, display_name: name }),
    });
    const body = await res.json();
    if (!res.ok) {
      showBanner('register-banner', body.detail || 'Registration failed.');
    } else {
      showBanner('register-banner', 'Account created! Signing you in…', 'success');
      // Auto-login after register
      setTimeout(async () => {
        const lr = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (lr.ok) window.location.href = '/';
      }, 800);
    }
  } catch (e) {
    showBanner('register-banner', 'Network error — is the server running?');
  } finally {
    setLoading('register-btn', false);
  }
}

// ── Check if already logged in ────────────────────────────────────────────
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) window.location.href = '/';
  } catch (_) {}
})();
</script>
</body>
</html>
