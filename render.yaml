services:
  - type: web
    name: ogai-annotator
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RENDER_DATA_DIR
        value: /data
    disk:
      name: ogai-data
      mountPath: /data
      sizeGB: 5
